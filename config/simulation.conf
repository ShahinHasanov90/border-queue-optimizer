# Border Queue Optimizer — Default Simulation Parameters
#
# Lines beginning with '#' are comments.
# Format: key = value

# ── Simulation ───────────────────────────────────────────────────────
duration          = 28800      # Total simulation time (seconds) — 8 hours
warmup            = 600        # Warmup period (seconds) — 10 minutes
seed              = 42         # RNG seed (0 = random)

# ── Border crossing layout ───────────────────────────────────────────
num_lanes         = 4          # Number of inspection lanes
max_queue_capacity = 0         # Max vehicles per queue (0 = unlimited)

# ── Arrival process ─────────────────────────────────────────────────
base_arrival_rate = 120        # Mean arrivals per hour
rush_hour_factor  = 2.0        # Multiplier during peak hours
rush_start_hour   = 7          # Rush period start (24h)
rush_end_hour     = 10         # Rush period end (24h)
seasonal_factor   = 1.0        # Seasonal adjustment (1.0 = normal)
weekend_factor    = 0.6        # Weekend traffic reduction

# ── Service ──────────────────────────────────────────────────────────
base_service_rate = 40         # Mean service rate per lane (vehicles/hour)

# ── Optimiser ────────────────────────────────────────────────────────
max_lanes         = 16         # Maximum available lanes
max_avg_wait      = 300        # Max acceptable avg wait (seconds)
target_utilization = 0.85      # Desired server utilization
staff_cost_per_lane = 50.0     # Cost per lane per hour ($)
wait_cost_per_sec = 0.10       # Cost per second of customer waiting ($)

# ── Predictor ────────────────────────────────────────────────────────
smoothing_alpha   = 0.3        # Exponential smoothing factor (0,1)
